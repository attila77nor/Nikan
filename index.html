<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikan sin ukeplan</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --dirt:    #8B6340;
  --dirt-dark: #6B4A2A;
  --stone:   #7F7F7F;
  --stone-light: #9F9F9F;
  --stone-dark: #5A5A5A;
  --grass:   #5D9B3A;
  --grass-top: #7BC950;
  --wood:    #9C7A3C;
  --wood-dark: #7A5A22;
  --gold:    #FFD700;
  --gold-dark: #C8A000;
  --emerald: #17DD62;
  --emerald-dark: #0EA048;
  --red:     #CC3333;
  --sky:     #6AB0E8;
  --sky-dark:#3D7DBD;
  --text-pixel: #FFFFFF;
  --text-shadow: #3F3F3F;
  --lava:    #E05A00;
  --bg: #1A1A2E;
}

body {
  font-family: 'Press Start 2P', monospace;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 50%, #16213e 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, #0f3460 0%, transparent 50%);
  color: var(--text-pixel);
  min-height: 100vh;
  padding: 1.5rem 1rem 4rem;
  image-rendering: pixelated;
}

header { text-align: center; margin-bottom: 2rem; }

.header-block {
  display: inline-block;
  background: var(--grass);
  background-image:
    linear-gradient(180deg, var(--grass-top) 0%, var(--grass-top) 30%, var(--grass) 30%, var(--grass) 45%, var(--dirt) 45%);
  padding: 1.2rem 2rem 1rem;
  border: 4px solid #000;
  box-shadow:
    inset 2px 2px 0 rgba(255,255,255,0.3),
    inset -2px -2px 0 rgba(0,0,0,0.5),
    5px 5px 0 #000;
  margin-bottom: 0.8rem;
}

.header-block h1 {
  font-size: clamp(0.75rem, 3vw, 1.1rem);
  color: #fff;
  text-shadow: 3px 3px 0 #000, -1px -1px 0 #000;
  letter-spacing: 1px;
  line-height: 1.6;
}

.header-block h1 span {
  color: var(--gold);
  text-shadow: 3px 3px 0 #7A4800, -1px -1px 0 #7A4800;
}

.week-label {
  font-size: 0.77rem;
  color: #aaa;
  text-shadow: 1px 1px 0 #000;
  letter-spacing: 1px;
}

.week-container { max-width: 900px; margin: 0 auto; }

.earnings-bar {
  background: var(--wood);
  background-image: repeating-linear-gradient(90deg, rgba(0,0,0,0.07) 0px, rgba(0,0,0,0.07) 2px, transparent 2px, transparent 18px);
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  border: 4px solid #000;
  box-shadow:
    inset 2px 2px 0 rgba(255,255,255,0.2),
    inset -2px -2px 0 rgba(0,0,0,0.4),
    4px 4px 0 #000;
}

.earnings-title {
  font-size: 0.77rem;
  color: var(--gold);
  text-shadow: 2px 2px 0 #7A4800;
  margin-bottom: 0.75rem;
  letter-spacing: 1px;
}

.earnings-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.68rem;
  color: #e8d5a0;
  text-shadow: 1px 1px 0 #000;
  padding: 0.3rem 0;
  letter-spacing: 0.5px;
}

.earnings-row.total {
  border-top: 3px solid #000;
  margin-top: 0.4rem;
  padding-top: 0.6rem;
  font-size: 0.94rem;
  color: var(--gold);
  text-shadow: 2px 2px 0 #7A4800;
}

.days-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.day-card {
  background: var(--stone);
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 8px),
    repeating-linear-gradient(90deg, rgba(0,0,0,0.05) 0, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 8px);
  border: 4px solid #000;
  box-shadow:
    inset 2px 2px 0 rgba(255,255,255,0.2),
    inset -2px -2px 0 rgba(0,0,0,0.4),
    4px 4px 0 #000;
  overflow: hidden;
}

.day-card.completed {
  background: #2A5C1A;
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 8px),
    repeating-linear-gradient(90deg, rgba(0,0,0,0.06) 0, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 8px);
  box-shadow:
    inset 2px 2px 0 rgba(255,255,255,0.15),
    inset -2px -2px 0 rgba(0,0,0,0.5),
    4px 4px 0 #000,
    0 0 0 2px var(--emerald);
}

.day-header {
  background: var(--stone-dark);
  background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0px, rgba(255,255,255,0.04) 1px, transparent 1px, transparent 10px);
  padding: 0.6rem 0.75rem;
  border-bottom: 3px solid #000;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.day-card.completed .day-header { background: #1A4A0A; }

.day-name {
  font-size: 0.77rem;
  color: #fff;
  text-shadow: 2px 2px 0 #000;
  letter-spacing: 0.5px;
}

.day-badge {
  font-size: 0.65rem;
  padding: 3px 6px;
  background: #000;
  color: #aaa;
  border: 2px solid #555;
  letter-spacing: 0.5px;
}

.day-card.completed .day-badge { color: var(--emerald); border-color: var(--emerald-dark); }

.task-list { padding: 0.4rem 0; }

.task-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 0.75rem;
  cursor: pointer;
  transition: background 0.1s;
}

.task-item:hover { background: rgba(255,255,255,0.08); }

.task-item input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  background: #1A1A1A;
  border: 3px solid #000;
  box-shadow: inset 1px 1px 0 #555, inset -1px -1px 0 #000;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
}

.task-item input[type="checkbox"]:checked { background: var(--emerald-dark); }

.task-item input[type="checkbox"]:checked::after {
  content: '✔';
  position: absolute;
  top: -2px;
  left: 1px;
  font-size: 15px;
  color: var(--emerald);
  text-shadow: 1px 1px 0 #000;
  font-family: monospace;
}

.task-item label {
  font-size: 0.65rem;
  color: #ddd;
  text-shadow: 1px 1px 0 #000;
  cursor: pointer;
  line-height: 1.8;
  flex: 1;
  letter-spacing: 0.3px;
}

.task-item.done label { text-decoration: line-through; color: #777; }

.task-item .del-btn {
  display: none;
  background: var(--red);
  color: #fff;
  border: 2px solid #000;
  width: 20px;
  height: 20px;
  font-size: 0.6rem;
  cursor: pointer;
  flex-shrink: 0;
  line-height: 1;
}

.edit-mode .task-item .del-btn { display: block; }
.edit-mode .task-item input[type="checkbox"] { opacity: 0.3; pointer-events: none; }

.day-footer {
  padding: 0.4rem 0.75rem 0.6rem;
  border-top: 2px solid #000;
  display: flex;
  align-items: center;
  gap: 8px;
}

.progress-bar-wrap {
  flex: 1;
  height: 6px;
  background: #1A1A1A;
  border: 2px solid #000;
  box-shadow: inset 1px 1px 0 #000;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--emerald-dark), var(--emerald));
  transition: width 0.3s ease;
}

.footer-kr {
  font-size: 0.65rem;
  color: var(--gold);
  text-shadow: 1px 1px 0 #7A4800;
  min-width: 40px;
  text-align: right;
}

.add-task-row {
  display: none;
  padding: 0.5rem 0.75rem;
  border-top: 2px dashed #000;
  gap: 0.4rem;
}
.edit-mode .add-task-row { display: flex; }

.add-task-row input {
  flex: 1;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.55rem;
  padding: 0.4rem;
  background: #1A1A1A;
  color: #fff;
  border: 2px solid #000;
}

.add-task-row button {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.55rem;
  padding: 0.4rem 0.6rem;
  background: var(--emerald-dark);
  color: #fff;
  border: 2px solid #000;
  cursor: pointer;
  white-space: nowrap;
}

.extras-section {
  background: var(--dirt);
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 6px),
    repeating-linear-gradient(90deg, rgba(0,0,0,0.06) 0, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 6px);
  border: 4px solid #000;
  box-shadow:
    inset 2px 2px 0 rgba(255,255,255,0.15),
    inset -2px -2px 0 rgba(0,0,0,0.4),
    4px 4px 0 #000;
  margin-bottom: 1.5rem;
  overflow: hidden;
}

.extras-header {
  background: var(--dirt-dark);
  padding: 0.6rem 0.75rem;
  border-bottom: 3px solid #000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.4rem;
}

.extras-title {
  font-size: 0.77rem;
  color: var(--gold);
  text-shadow: 2px 2px 0 #7A4800;
  letter-spacing: 0.5px;
}

.extras-subtitle {
  font-size: 0.65rem;
  color: #c8a86a;
  text-shadow: 1px 1px 0 #000;
}

.extras-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  padding: 0.5rem;
  gap: 0.5rem;
}

.extra-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.55rem 0.7rem;
  background: rgba(0,0,0,0.25);
  border: 2px solid #000;
  box-shadow: inset 1px 1px 0 rgba(255,255,255,0.1);
  cursor: pointer;
}

.extra-item:hover { background: rgba(255,180,0,0.12); border-color: var(--gold-dark); }
.extra-item.done { background: rgba(255,180,0,0.18); border-color: var(--gold-dark); }

.extra-item input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  background: #1A1A1A;
  border: 3px solid #000;
  box-shadow: inset 1px 1px 0 #555, inset -1px -1px 0 #000;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
}

.extra-item input[type="checkbox"]:checked { background: var(--gold-dark); }

.extra-item input[type="checkbox"]:checked::after {
  content: '✔';
  position: absolute;
  top: -2px;
  left: 1px;
  font-size: 15px;
  color: var(--gold);
  text-shadow: 1px 1px 0 #000;
  font-family: monospace;
}

.extra-item label {
  font-size: 0.65rem;
  color: #ddd;
  text-shadow: 1px 1px 0 #000;
  cursor: pointer;
  flex: 1;
  line-height: 1.8;
  letter-spacing: 0.3px;
}

.extra-item .kr-badge {
  font-size: 0.65rem;
  color: var(--gold);
  text-shadow: 1px 1px 0 #7A4800;
  white-space: nowrap;
}

.extra-item .del-btn {
  display: none;
  background: var(--red);
  color: #fff;
  border: 2px solid #000;
  width: 20px;
  height: 20px;
  font-size: 0.6rem;
  cursor: pointer;
  flex-shrink: 0;
  line-height: 1;
}
.edit-mode .extra-item .del-btn { display: block; }

.add-extra-row {
  display: flex;
  padding: 0.5rem 0.75rem;
  gap: 0.4rem;
  border-top: 2px dashed #000;
  flex-wrap: wrap;
}

.add-extra-row input[type="text"] {
  flex: 1;
  min-width: 140px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.55rem;
  padding: 0.4rem;
  background: #1A1A1A;
  color: #fff;
  border: 2px solid #000;
}

.add-extra-row select, .add-extra-row button {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.55rem;
  padding: 0.4rem 0.5rem;
  background: var(--gold-dark);
  color: #1A1A1A;
  border: 2px solid #000;
  cursor: pointer;
}

.bottom-bar {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  gap: 0.75rem;
  align-items: center;
  flex-wrap: wrap;
}

.btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.68rem;
  padding: 0.6rem 1rem;
  background: var(--stone-dark);
  color: #ddd;
  border: 3px solid #000;
  box-shadow:
    inset 1px 1px 0 rgba(255,255,255,0.2),
    inset -1px -1px 0 rgba(0,0,0,0.4),
    3px 3px 0 #000;
  cursor: pointer;
  text-shadow: 1px 1px 0 #000;
  letter-spacing: 0.5px;
  transition: transform 0.08s, box-shadow 0.08s;
}

.btn:hover { background: var(--stone); }
.btn:active { transform: translate(2px, 2px); box-shadow: inset 1px 1px 0 rgba(0,0,0,0.4), 1px 1px 0 #000; }

.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #AA2222; }

.btn-edit { background: var(--gold-dark); color: #1A1A1A; }
.btn-edit:hover { background: #DDB800; }
.btn-edit.active { background: var(--emerald-dark); color: #fff; }

.saved-indicator {
  font-size: 0.65rem;
  color: var(--emerald);
  text-shadow: 1px 1px 0 #000;
  margin-left: auto;
}

.toast {
  position: fixed;
  top: 1.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(-30px);
  background: var(--wood-dark);
  color: var(--gold);
  font-family: 'Press Start 2P', monospace;
  font-size: 0.77rem;
  padding: 0.75rem 1.25rem;
  border: 4px solid #000;
  box-shadow:
    inset 1px 1px 0 rgba(255,255,255,0.2),
    inset -1px -1px 0 rgba(0,0,0,0.4),
    4px 4px 0 #000;
  opacity: 0;
  transition: all 0.25s ease;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
  text-align: center;
  text-shadow: 2px 2px 0 #7A4800;
  letter-spacing: 0.5px;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.edit-banner {
  display: none;
  max-width: 900px;
  margin: 0 auto 1rem;
  background: var(--gold-dark);
  color: #1A1A1A;
  font-size: 0.6rem;
  padding: 0.6rem 0.9rem;
  border: 3px solid #000;
  text-align: center;
  letter-spacing: 0.5px;
}
body.edit-mode .edit-banner { display: block; }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 55%, rgba(255,255,255,0.4) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

body > * { position: relative; z-index: 1; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<header>
  <div class="header-block">
    <h1>⛏ <span>NIKAN</span> SIN UKEPLAN ⛏</h1>
  </div>
  <div class="week-label" id="week-label">Laster...</div>
</header>

<div class="edit-banner">✎ REDIGERINGSMODUS — endringer her er PERMANENTE og påvirker alle uker</div>

<div class="week-container">
  <div class="earnings-bar">
    <div class="earnings-title">▶ UKENS BELØNNING</div>
    <div class="earnings-row">
      <span>Dagoppgaver (20 kr/dag)</span>
      <span id="earn-daily">0 kr</span>
    </div>
    <div class="earnings-row">
      <span>Ekstraoppgaver (30 kr/stk)</span>
      <span id="earn-extras">0 kr</span>
    </div>
    <div class="earnings-row total">
      <span>★ TOTALT TJENT</span>
      <span id="earn-total">0 kr</span>
    </div>
  </div>

  <div class="days-grid" id="days-grid"></div>

  <div class="extras-section">
    <div class="extras-header">
      <span class="extras-title">★ EKSTRAOPPGAVER</span>
      <span class="extras-subtitle">30 kr per oppgave</span>
    </div>
    <div class="extras-grid" id="extras-grid"></div>
    <div class="add-extra-row">
      <input type="text" id="new-extra-input" placeholder="Ny ekstraoppgave...">
      <select id="new-extra-type">
        <option value="temp">Midlertidig (forsvinner ved tøm)</option>
        <option value="permanent">Permanent</option>
      </select>
      <button onclick="addExtraTask()">+ Legg til</button>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="btn btn-edit" id="edit-toggle-btn" onclick="toggleEditMode()">✎ Rediger maler</button>
    <button class="btn btn-danger" onclick="resetWeek()">☠ Tøm ukeark</button>
    <span class="saved-indicator" id="saved-indicator"></span>
  </div>
</div>

<script>
const DEFAULT_DAYS_CONFIG = [
  { key: 'mon', name: 'MANDAG', tasks: [
    'Legge frem klær til neste dag','Pakke sekken sin','Pusse tenner',
    'Rydde inn i oppvaskmaskin','Skitne klær i skittentøyskurv','Re sengen'
  ]},
  { key: 'tue', name: 'TIRSDAG', tasks: [
    'Legge frem klær til neste dag','Pakke sekken sin','Pusse tenner',
    'Rydde inn i oppvaskmaskin','Skitne klær i skittentøyskurv','Re sengen'
  ]},
  { key: 'wed', name: 'ONSDAG', tasks: [
    'Legge frem klær til neste dag','Pakke sekken sin','Pusse tenner',
    'Rydde inn i oppvaskmaskin','Skitne klær i skittentøyskurv','Re sengen'
  ]},
  { key: 'thu', name: 'TORSDAG', tasks: [
    'Legge frem klær til neste dag','Pakke sekken sin','Pusse tenner',
    'Rydde inn i oppvaskmaskin','Skitne klær i skittentøyskurv','Re sengen',
    'Samtlige lekser ferdig'
  ]},
  { key: 'fri', name: 'FREDAG', tasks: [
    'Pakke sekken sin','Pusse tenner','Rydde inn i oppvaskmaskin',
    'Skitne klær i skittentøyskurv','Re sengen'
  ]},
  { key: 'sat', name: 'LØRDAG', tasks: [
    'Rydde rommet sitt','Re sengen','Rydde inn i oppvaskmaskin','Skitne klær i skittentøyskurv'
  ]},
  { key: 'sun', name: 'SØNDAG', tasks: [
    'Legge frem klær til neste dag','Re sengen','Rydde inn i oppvaskmaskin','Skitne klær i skittentøyskurv'
  ]}
];

const DEFAULT_EXTRAS = [
  'Støvsuge bilen','Klippe gresset hagen','Klippe gresset foran',
  'Støvsuge rommet sitt','Tørke støv på lister','Henge klær til tørk','Legge på plass tørre klær'
];

const DAY_REWARD = 20;
const EXTRA_REWARD = 30;
const STATE_KEY = 'nikan_tracker_v5';
const TEMPLATE_KEY = 'nikan_templates_v1';

let DAYS_CONFIG = [];
let PERMANENT_EXTRAS = [];
let state = {};
let editMode = false;
let shownCompleted = {};

function loadTemplates() {
  try {
    const raw = localStorage.getItem(TEMPLATE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      DAYS_CONFIG = parsed.days;
      PERMANENT_EXTRAS = parsed.extras;
      return;
    }
  } catch(e) {}
  DAYS_CONFIG = JSON.parse(JSON.stringify(DEFAULT_DAYS_CONFIG));
  PERMANENT_EXTRAS = [...DEFAULT_EXTRAS];
  saveTemplates();
}

function saveTemplates() {
  localStorage.setItem(TEMPLATE_KEY, JSON.stringify({ days: DAYS_CONFIG, extras: PERMANENT_EXTRAS }));
}

function getWeekKey() {
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, '0')}`;
}

function getWeekLabel() {
  const now = new Date();
  const day = now.getDay() || 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - day + 1);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const fmt = d => d.toLocaleDateString('no-NO', { day: 'numeric', month: 'long' });
  return `UKE ${getWeekKey().split('W')[1]}  ·  ${fmt(monday)} – ${fmt(sunday)}`;
}

// state.days[dayKey] = { taskText: true/false, ... }  (keyed by task text, not index, so template edits don't break checks)
// state.extras = { taskText: true/false } for permanent extras, keyed by text
// state.tempExtras = [{ text, done }] for temporary one-off extras

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.weekKey === getWeekKey()) {
        if (!parsed.tempExtras) parsed.tempExtras = [];
        return parsed;
      }
    }
  } catch(e) {}
  return { weekKey: getWeekKey(), days: {}, extras: {}, tempExtras: [] };
}

function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
  const ind = document.getElementById('saved-indicator');
  if (ind) {
    ind.textContent = '✔ LAGRET';
    setTimeout(() => { ind.textContent = ''; }, 1500);
  }
}

function calcEarnings() {
  let daily = 0;
  DAYS_CONFIG.forEach(day => {
    const ds = state.days[day.key] || {};
    const done = day.tasks.filter(t => ds[t]).length;
    if (done === day.tasks.length && day.tasks.length > 0) daily += DAY_REWARD;
  });
  let extras = 0;
  PERMANENT_EXTRAS.forEach(t => { if (state.extras[t]) extras += EXTRA_REWARD; });
  (state.tempExtras || []).forEach(item => { if (item.done) extras += EXTRA_REWARD; });
  return { daily, extras, total: daily + extras };
}

function updateEarnings() {
  const { daily, extras, total } = calcEarnings();
  document.getElementById('earn-daily').textContent = daily + ' kr';
  document.getElementById('earn-extras').textContent = extras + ' kr';
  document.getElementById('earn-total').textContent = total + ' kr';
}

function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('edit-toggle-btn');
  btn.textContent = editMode ? '✔ Ferdig redigert' : '✎ Rediger maler';
  btn.classList.toggle('active', editMode);
  renderDays();
  renderExtras();
}

function renderDays() {
  const grid = document.getElementById('days-grid');
  grid.innerHTML = '';

  DAYS_CONFIG.forEach(day => {
    const dayState = state.days[day.key] || {};
    const totalTasks = day.tasks.length;
    const doneTasks = day.tasks.filter(t => dayState[t]).length;
    const allDone = doneTasks === totalTasks && totalTasks > 0;

    const card = document.createElement('div');
    card.className = 'day-card' + (allDone ? ' completed' : '');

    const header = document.createElement('div');
    header.className = 'day-header';
    let badgeText = allDone ? '★ FULLFØRT' : `${doneTasks}/${totalTasks}`;
    header.innerHTML = `<span class="day-name">${day.name}</span><span class="day-badge">${badgeText}</span>`;
    card.appendChild(header);

    const list = document.createElement('div');
    list.className = 'task-list';

    day.tasks.forEach((task) => {
      const checked = !!dayState[task];
      const item = document.createElement('div');
      item.className = 'task-item' + (checked ? ' done' : '');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      const cbId = `${day.key}-${task}`.replace(/\s+/g, '_');
      cb.id = cbId;
      cb.checked = checked;

      const lbl = document.createElement('label');
      lbl.htmlFor = cbId;
      lbl.textContent = task;

      cb.addEventListener('change', () => {
        if (!state.days[day.key]) state.days[day.key] = {};
        state.days[day.key][task] = cb.checked;
        saveState();
        updateEarnings();
        const newDone = day.tasks.filter(t => state.days[day.key][t]).length;
        if (newDone === totalTasks && !shownCompleted[day.key]) {
          shownCompleted[day.key] = true;
          showToast(`★ ${day.name} FULLFØRT! +${DAY_REWARD} kr ★`, 3000);
        } else if (newDone < totalTasks) {
          shownCompleted[day.key] = false;
        }
        renderDays();
      });

      const delBtn = document.createElement('button');
      delBtn.className = 'del-btn';
      delBtn.textContent = '✕';
      delBtn.title = 'Fjern oppgave permanent';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!confirm(`Fjerne "${task}" fra ${day.name} permanent? Dette gjelder for alle fremtidige uker.`)) return;
        day.tasks = day.tasks.filter(t => t !== task);
        saveTemplates();
        renderDays();
        updateEarnings();
      });

      item.appendChild(cb);
      item.appendChild(lbl);
      item.appendChild(delBtn);
      list.appendChild(item);
    });

    card.appendChild(list);

    const pct = totalTasks > 0 ? (doneTasks / totalTasks) * 100 : 0;
    const footer = document.createElement('div');
    footer.className = 'day-footer';
    footer.innerHTML = `
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <span class="footer-kr">${allDone ? DAY_REWARD + ' kr' : ''}</span>
    `;
    card.appendChild(footer);

    if (editMode) {
      const addRow = document.createElement('div');
      addRow.className = 'add-task-row';
      addRow.innerHTML = `
        <input type="text" placeholder="Ny fast oppgave...">
        <button>+ Legg til</button>
      `;
      const input = addRow.querySelector('input');
      const btn = addRow.querySelector('button');
      const submit = () => {
        const val = input.value.trim();
        if (!val) return;
        if (day.tasks.includes(val)) { input.value = ''; return; }
        day.tasks.push(val);
        saveTemplates();
        renderDays();
        updateEarnings();
      };
      btn.addEventListener('click', submit);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
      card.appendChild(addRow);
    }

    grid.appendChild(card);
  });
}

function renderExtras() {
  const grid = document.getElementById('extras-grid');
  grid.innerHTML = '';

  PERMANENT_EXTRAS.forEach((task) => {
    const checked = !!state.extras[task];
    const item = document.createElement('div');
    item.className = 'extra-item' + (checked ? ' done' : '');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    const cbId = `extra-${task}`.replace(/\s+/g, '_');
    cb.id = cbId;
    cb.checked = checked;

    const lbl = document.createElement('label');
    lbl.htmlFor = cbId;
    lbl.textContent = task;

    const badge = document.createElement('span');
    badge.className = 'kr-badge';
    badge.textContent = '30 kr';

    cb.addEventListener('change', () => {
      state.extras[task] = cb.checked;
      saveState();
      updateEarnings();
      item.className = 'extra-item' + (cb.checked ? ' done' : '');
    });

    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.textContent = '✕';
    delBtn.title = 'Fjern permanent';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!confirm(`Fjerne "${task}" fra ekstraoppgaver permanent?`)) return;
      PERMANENT_EXTRAS = PERMANENT_EXTRAS.filter(t => t !== task);
      saveTemplates();
      renderExtras();
      updateEarnings();
    });

    item.appendChild(cb);
    item.appendChild(lbl);
    item.appendChild(badge);
    item.appendChild(delBtn);
    grid.appendChild(item);
  });

  (state.tempExtras || []).forEach((te, idx) => {
    const item = document.createElement('div');
    item.className = 'extra-item' + (te.done ? ' done' : '');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    const cbId = `tempextra-${idx}`;
    cb.id = cbId;
    cb.checked = te.done;

    const lbl = document.createElement('label');
    lbl.htmlFor = cbId;
    lbl.textContent = te.text + ' (engang)';

    const badge = document.createElement('span');
    badge.className = 'kr-badge';
    badge.textContent = '30 kr';

    cb.addEventListener('change', () => {
      state.tempExtras[idx].done = cb.checked;
      saveState();
      updateEarnings();
      item.className = 'extra-item' + (cb.checked ? ' done' : '');
    });

    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.style.display = 'block';
    delBtn.textContent = '✕';
    delBtn.title = 'Fjern';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      state.tempExtras.splice(idx, 1);
      saveState();
      renderExtras();
      updateEarnings();
    });

    item.appendChild(cb);
    item.appendChild(lbl);
    item.appendChild(badge);
    item.appendChild(delBtn);
    grid.appendChild(item);
  });
}

function addExtraTask() {
  const input = document.getElementById('new-extra-input');
  const type = document.getElementById('new-extra-type').value;
  const val = input.value.trim();
  if (!val) return;

  if (type === 'permanent') {
    if (!PERMANENT_EXTRAS.includes(val)) {
      PERMANENT_EXTRAS.push(val);
      saveTemplates();
    }
  } else {
    if (!state.tempExtras) state.tempExtras = [];
    state.tempExtras.push({ text: val, done: false });
    saveState();
  }
  input.value = '';
  renderExtras();
  updateEarnings();
}

document.getElementById('new-extra-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addExtraTask();
});

function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  setTimeout(() => { t.className = 'toast'; }, duration || 2000);
}

function resetWeek() {
  if (!confirm('Tøm ukearket? All avkryssing og midlertidige ekstraoppgaver slettes. Faste oppgaver/maler beholdes.')) return;
  state = { weekKey: getWeekKey(), days: {}, extras: {}, tempExtras: [] };
  shownCompleted = {};
  saveState();
  renderDays();
  renderExtras();
  updateEarnings();
  showToast('☠ UKEARK TØMT', 2000);
}

function init() {
  document.getElementById('week-label').textContent = getWeekLabel();
  loadTemplates();
  state = loadState();
  renderDays();
  renderExtras();
  updateEarnings();
}

init();
</script>
</body>
</html>
